<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <meta name="description" content="Sign in to the GitHub Issues Tracker to manage your project issues.">
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <div class="card w-full max-w-md bg-base-100 shadow-xl p-8" id="login-card">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="currentColor" class="mb-4">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-purple-600 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-4">
            <!-- Username -->
            <div class="form-control w-full">
                <label class="label" for="username-input">
                    <span class="label-text font-semibold text-gray-700">Username</span>
                </label>
                <input type="text" id="username-input" placeholder="Enter Username" class="input input-bordered w-full" required />
                <label class="label">
                    <span class="label-text-alt text-purple-600">Default: admin</span>
                </label>
            </div>

            <!-- Password -->
            <div class="form-control w-full">
                <label class="label" for="password-input">
                    <span class="label-text font-semibold text-gray-700">Password</span>
                </label>
                <input type="password" id="password-input" placeholder="Enter Password" class="input input-bordered w-full" required />
                <label class="label">
                    <span class="label-text-alt text-purple-600">Default: admin123</span>
                </label>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="text-red-500 text-sm text-center hidden">
                Invalid username or password. Please try again.
            </div>

            <!-- Sign In Button -->
            <button type="submit" id="sign-in-btn" class="btn w-full text-white border-none" style="background: linear-gradient(135deg, #6366f1, #7c3aed);">
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="divider text-gray-400 text-sm my-4">OR</div>

        <!-- Demo Credentials -->
        <div class="text-center">
            <p class="text-gray-400 text-sm mb-2">Demo Credentials:</p>
            <div class="bg-gray-50 rounded-lg p-4 border border-gray-100">
                <p class="text-sm"><span class="font-semibold text-gray-700">Username:</span> admin</p>
                <p class="text-sm"><span class="font-semibold text-gray-700">Password:</span> admin123</p>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
