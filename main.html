<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>
    <meta name="description" content="Track and manage your GitHub project issues with ease.">
    <!-- Tailwind CSS + DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Card top border colors */
        .card-open {
            border-top: 4px solid #22c55e;
        }

        .card-closed {
            border-top: 4px solid #8b5cf6;
        }

        /* Loading spinner */
        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #e5e7eb;
            border-top: 5px solid #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Tab active styles */
        .tab-btn {
            transition: all 0.2s ease;
        }

        .tab-btn.tab-active {
            background-color: #f59e0b;
            color: white;
            border-radius: 9999px;
            padding: 6px 24px;
            font-weight: 600;
        }

        .tab-btn:not(.tab-active) {
            background-color: transparent;
            color: #6b7280;
            border-radius: 9999px;
            padding: 6px 24px;
        }

        .tab-btn:not(.tab-active):hover {
            background-color: #f3f4f6;
        }

        /* Priority badge colors */
        .priority-high {
            background-color: #ef4444;
            color: white;
        }

        .priority-medium {
            background-color: #f59e0b;
            color: white;
        }

        .priority-low {
            background-color: #22c55e;
            color: white;
        }

        /* Label badge colors */
        .label-bug {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .label-enhancement {
            background-color: #d1fae5;
            color: #059669;
        }

        .label-documentation {
            background-color: #dbeafe;
            color: #2563eb;
        }

        .label-help-wanted {
            background-color: #fef3c7;
            color: #d97706;
        }

        .label-good-first-issue {
            background-color: #ede9fe;
            color: #7c3aed;
        }

        /* Modal backdrop */
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        /* Card hover */
        .issue-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .issue-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <!-- ==================== NAVBAR ==================== -->
    <nav class="navbar bg-base-100 shadow-md px-4 lg:px-8 sticky top-0 z-40">
        <!-- Left: Logo + Name -->
        <div class="flex-1">
            <a href="main.html" class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
                <span class="text-lg font-bold text-gray-800">GitHub Issues Tracker</span>
            </a>
        </div>

        <!-- Right: Search + Signout -->
        <div class="flex items-center gap-3">
            <div class="form-control">
                <div class="join">
                    <input type="text" id="search-input" placeholder="Search issues..."
                        class="input input-bordered input-sm join-item w-40 lg:w-64" />
                    <button id="search-btn" class="btn btn-sm join-item"
                        style="background: linear-gradient(135deg, #6366f1, #7c3aed); color: white; border: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </div>
            </div>
            <button id="signout-btn" class="btn btn-sm text-white border-none"
                style="background: linear-gradient(135deg, #6366f1, #7c3aed);">
                Sign Out
            </button>
        </div>
    </nav>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="max-w-7xl mx-auto px-4 lg:px-8 py-6">

        <!-- Tabs Section -->
        <div class="flex items-center gap-2 mb-6">
            <button class="tab-btn tab-active" data-tab="all" id="tab-all">All</button>
            <button class="tab-btn" data-tab="open" id="tab-open">Open</button>
            <button class="tab-btn" data-tab="closed" id="tab-closed">Closed</button>
        </div>

        <!-- Issue Count & Legend -->
        <div
            class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6 bg-base-100 rounded-lg p-4 shadow-sm border border-gray-100">
            <div class="flex items-center gap-3">
                <!-- Issue Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-600" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                <div>
                    <h2 class="text-xl font-bold text-gray-800"><span id="issue-count">0</span> Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-4 mt-3 sm:mt-0">
                <span class="flex items-center gap-1 text-sm text-gray-600">
                    <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span> Open
                </span>
                <span class="flex items-center gap-1 text-sm text-gray-600">
                    <span class="w-3 h-3 rounded-full bg-purple-500 inline-block"></span> Closed
                </span>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading-spinner" class="flex flex-col items-center justify-center py-20">
            <div class="spinner"></div>
            <p class="text-gray-500 mt-4 text-sm">Loading issues...</p>
        </div>

        <!-- Issues Grid -->
        <div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 hidden">
            <!-- Cards will be injected here by JS -->
        </div>

        <!-- No Results Message -->
        <div id="no-results" class="hidden flex flex-col items-center justify-center py-20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-gray-400 text-lg font-medium">No issues found</p>
            <p class="text-gray-400 text-sm">Try a different search or filter</p>
        </div>
    </main>

    <!-- ==================== ISSUE DETAIL MODAL ==================== -->
    <div id="issue-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop">
        <div
            class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 p-6 relative animate-fadeIn max-h-[90vh] overflow-y-auto">
            <!-- Modal Header -->
            <h3 id="modal-title" class="text-xl font-bold text-gray-800 pr-8 mb-2"></h3>
            <div id="modal-meta" class="flex items-center gap-2 mb-4 text-sm"></div>

            <!-- Modal Body -->
            <p id="modal-description" class="text-gray-600 mb-5 leading-relaxed"></p>

            <!-- Details Grid -->
            <div class="grid grid-cols-2 gap-4 mb-5">
                <div>
                    <p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Assignee</p>
                    <p id="modal-assignee" class="text-sm font-medium text-gray-700"></p>
                </div>
                <div>
                    <p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Priority</p>
                    <p id="modal-priority" class="text-sm font-medium"></p>
                </div>
                <div>
                    <p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Author</p>
                    <p id="modal-author" class="text-sm font-medium text-gray-700"></p>
                </div>
                <div>
                    <p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Created At</p>
                    <p id="modal-created" class="text-sm font-medium text-gray-700"></p>
                </div>
            </div>

            <!-- Labels -->
            <div class="mb-5">
                <p class="text-xs text-gray-400 uppercase tracking-wide mb-2">Labels</p>
                <div id="modal-labels" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- Close Button -->
            <button id="modal-close-btn" class="btn w-full text-white border-none"
                style="background: linear-gradient(135deg, #6366f1, #7c3aed);">Close</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
